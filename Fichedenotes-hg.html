<!DOCTYPE HTML>
<html>
    <head>
        <meta charset="UTF-8">
         <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <title>Histoire-géo mon combat</title>
    </head>

      <style>
body {
    font-family: 'Poppins', sans-serif;
    background-color: #f5f5f5;
    margin: 0;
     transform: translateY(20px) scale(0.98);
    animation: pageFade 1s ease forwards;
}

@keyframes pageFade {
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
        
}

/* HEADER */
header {
    background-color: #0b3d91;
    text-align: center;
    padding: 20px;
    color: white;
}

header h1 {
    background: white;
    color: black;
    display: inline-block;
    padding: 10px 20px;
    border-radius: 10px;
}

.cards-container {
  display: flex;       /* mettre les cards côte à côte */
  flex-wrap: wrap;     /* passe à la ligne si besoin */
  gap: 20px;           /* espace entre les cards */
  justify-content: center;
  margin-top: 20px;
}

.card {
  width: 500px;        /* largeur de chaque card */
  height: 400px;
  border: 1px solid #ccc;
  border-radius: 10px; /* coins arrondis */
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  transition: transform 0.3s, box-shadow 0.3s;
}

.card img {
  width: 100%;         /* image prend toute la card */
    /* garder proportions et recadrer si besoin */
}

.card .caption {
  text-align: center;
  font-weight: bold;
  background-color: #f8f8f8;
}

/* effet au survol */
.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 12px rgba(0,0,0,0.2);
}

    </style>

    <body>
        <header>
            <h1>Des fiches de notes stylées à télécharger !</h1>
        </header>

        <main>
            <div class="cards-container">
  <div class="card">
    <img src="https://raw.githubusercontent.com/elisa00307-sudo/site-hg-mon-combat/main/1.png" alt="fiche science">
    <div class="caption">2nd cycle thème <strong><em>sciences</em></strong></div>
    <a href="fiche1.pdf" download>
  📥 Télécharger la fiche
</a>
  </div>

  <div class="card">
    <img src="https://raw.githubusercontent.com/elisa00307-sudo/site-hg-mon-combat/main/3.png" alt="Français Chap 1">
    <div class="caption">1er cycle spécial Ste Marie</div>
    <a href="fiche1.pdf" download>
  📥 Télécharger la fiche
</a>
  </div>

  <div class="card">
    <img src="https://raw.githubusercontent.com/elisa00307-sudo/site-hg-mon-combat/main/tableau%20de%20notes.png" alt="Histoire Chap 1">
    <div class="caption">2nd cycle</div>
    <a href="fiche1.pdf" download>
  📥 Télécharger la fiche
</a>
  </div>
</div>
        </main>
    </body>
</html>
