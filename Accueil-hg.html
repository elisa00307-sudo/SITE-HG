<!DOCTYPE HTML>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <title>Histoire-géo mon combat</title>
    </head>

      <style>
body {
    font-family: 'Poppins', sans-serif;
    background-color: #f5f5f5;
    margin: 0;
     transform: translateY(20px) scale(0.98);
    animation: pageFade 1s ease forwards;
}

@keyframes pageFade {
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
        
}

/* HEADER */
header {
    background-color: #0b3d91;
    text-align: center;
    padding: 20px;
    color: white;
}

header h1 {
    background: white;
    color: black;
    display: inline-block;
    padding: 10px 20px;
    border-radius: 10px;
}

/* TITRE */
h2 {
    text-align: center;
    margin-top: 40px;
}

/* CONTAINER */
.inscription {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 40px;
    flex-wrap: wrap;
}

 .inscription button {
    background: gold;
    border: none;
    padding: 12px 25px;
    border-radius: 30px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
}

.inscription button:hover {
    background: #0b3d91;
    color: white;
    transform: scale(1.05);
}



    </style>
</head>

<body>

<header>
    <h1>Rejoins-nous</h1>
    <p>en un seul clic👌🏽</p>
</header>

<h2>✨C'est parti !</h2>

<section class="inscription">
        <form>
            <button type="submit">INSCRIPTION</button>
            <button type="submit">CONNEXION</button>
        </form>
    </section>

</section>

</body>
</html>
</html>
